version: '3.9'

# ────────────────────────────────────────────
# RetroWorks HR — Production Stack
# ────────────────────────────────────────────
# Services:
#  api         — NestJS REST API (port 3001)
#  web         — Next.js frontend (port 3000)
#  postgres    — PostgreSQL 16 + pgvector extension
#  redis       — Redis 7 (sessions, BullMQ, caching)
#  nginx       — Reverse proxy + SSL termination
#  prometheus  — Metrics collection
#  grafana     — Monitoring dashboard
#  pgadmin     — DB admin UI (dev only)

networks:
  retroworks:
    driver: bridge
  monitoring:
    driver: bridge

volumes:
  postgres_data:
  redis_data:
  nginx_certs:
  prometheus_data:
  grafana_data:

services:

  # ── PostgreSQL 16 + pgvector ──────────────────────────────
  postgres:
    image: pgvector/pgvector:pg16
    container_name: retroworks_postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-retroworks}
      POSTGRES_USER: ${POSTGRES_USER:-retroworks}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD required}
      POSTGRES_INITDB_ARGS: '--encoding=UTF8 --locale=C'
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./infra/postgres/init.sql:/docker-entrypoint-initdb.d/01-init.sql:ro
    ports:
      - '${POSTGRES_PORT:-5432}:5432'
    networks: [retroworks]
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U ${POSTGRES_USER:-retroworks} -d ${POSTGRES_DB:-retroworks}']
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    command: >
      postgres
        -c shared_preload_libraries=pg_stat_statements
        -c pg_stat_statements.track=all
        -c max_connections=200
        -c shared_buffers=256MB
        -c effective_cache_size=1GB
        -c maintenance_work_mem=64MB
        -c checkpoint_completion_target=0.9
        -c wal_buffers=16MB
        -c default_statistics_target=100

  # ── Redis 7 ───────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: retroworks_redis
    restart: unless-stopped
    command: >
      redis-server
        --requirepass ${REDIS_PASSWORD:?REDIS_PASSWORD required}
        --maxmemory 512mb
        --maxmemory-policy allkeys-lru
        --appendonly yes
        --appendfsync everysec
    volumes:
      - redis_data:/data
    ports:
      - '${REDIS_PORT:-6379}:6379'
    networks: [retroworks]
    healthcheck:
      test: ['CMD', 'redis-cli', '-a', '${REDIS_PASSWORD}', 'ping']
      interval: 10s
      timeout: 5s
      retries: 5

  # ── NestJS API ────────────────────────────────────────────
  api:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
      target: production
    container_name: retroworks_api
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      NODE_ENV: production
      PORT: 3001
      DATABASE_URL: postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}?schema=public
      REDIS_URL: redis://:${REDIS_PASSWORD}@redis:6379
      JWT_SECRET: ${JWT_SECRET:?JWT_SECRET required}
      JWT_REFRESH_SECRET: ${JWT_REFRESH_SECRET:?JWT_REFRESH_SECRET required}
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      AI_PROVIDER: ${AI_PROVIDER:-anthropic}
      SENDGRID_API_KEY: ${SENDGRID_API_KEY:-}
      EMAIL_FROM: ${EMAIL_FROM:-hr@retroworks.app}
      SLACK_SIGNING_SECRET: ${SLACK_SIGNING_SECRET:-}
      CORS_ORIGINS: ${CORS_ORIGINS:-http://localhost:3000}
      APP_URL: ${APP_URL:-http://localhost:3000}
    ports:
      - '3001:3001'
    networks: [retroworks, monitoring]
    healthcheck:
      test: ['CMD', 'wget', '--no-verbose', '--tries=1', '--spider', 'http://localhost:3001/health']
      interval: 15s
      timeout: 10s
      retries: 3
      start_period: 60s
    deploy:
      resources:
        limits:
          cpus: '2'
          memory: 2G
        reservations:
          cpus: '0.5'
          memory: 512M

  # ── Next.js Frontend ──────────────────────────────────────
  web:
    build:
      context: .
      dockerfile: apps/web/Dockerfile
      target: production
    container_name: retroworks_web
    restart: unless-stopped
    depends_on:
      - api
    environment:
      NODE_ENV: production
      NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-http://localhost:3001/api/v1}
      NEXT_TELEMETRY_DISABLED: '1'
    ports:
      - '3000:3000'
    networks: [retroworks]
    healthcheck:
      test: ['CMD', 'wget', '--no-verbose', '--tries=1', '--spider', 'http://localhost:3000']
      interval: 15s
      timeout: 10s
      retries: 3
      start_period: 60s

  # ── Nginx reverse proxy ───────────────────────────────────
  nginx:
    image: nginx:1.25-alpine
    container_name: retroworks_nginx
    restart: unless-stopped
    depends_on: [api, web]
    volumes:
      - ./infra/nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./infra/nginx/sites:/etc/nginx/conf.d:ro
      - nginx_certs:/etc/nginx/certs
    ports:
      - '80:80'
      - '443:443'
    networks: [retroworks]
    healthcheck:
      test: ['CMD', 'nginx', '-t']
      interval: 30s
      timeout: 10s
      retries: 3

  # ── Prometheus ────────────────────────────────────────────
  prometheus:
    image: prom/prometheus:latest
    container_name: retroworks_prometheus
    restart: unless-stopped
    volumes:
      - ./infra/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.retention.time=30d'
      - '--web.enable-lifecycle'
    networks: [retroworks, monitoring]
    ports:
      - '9090:9090'

  # ── Grafana ───────────────────────────────────────────────
  grafana:
    image: grafana/grafana:latest
    container_name: retroworks_grafana
    restart: unless-stopped
    depends_on: [prometheus]
    environment:
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_PASSWORD:-retroworks_grafana}
      GF_USERS_ALLOW_SIGN_UP: 'false'
      GF_SERVER_ROOT_URL: ${GRAFANA_URL:-http://localhost:3002}
    volumes:
      - grafana_data:/var/lib/grafana
      - ./infra/grafana/dashboards:/etc/grafana/provisioning/dashboards:ro
      - ./infra/grafana/datasources:/etc/grafana/provisioning/datasources:ro
    ports:
      - '3002:3000'
    networks: [monitoring]

  # ── PgAdmin (dev only — remove in prod) ───────────────────
  pgadmin:
    image: dpage/pgadmin4:latest
    container_name: retroworks_pgadmin
    restart: unless-stopped
    profiles: ['dev']  # Only runs with --profile dev
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      PGADMIN_DEFAULT_EMAIL: ${PGADMIN_EMAIL:-admin@retroworks.local}
      PGADMIN_DEFAULT_PASSWORD: ${PGADMIN_PASSWORD:-retroworks_pgadmin}
    ports:
      - '5050:80'
    networks: [retroworks]
